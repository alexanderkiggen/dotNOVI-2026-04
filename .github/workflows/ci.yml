name: CI - Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen uit GitHub
        uses: actions/checkout@v4

      - name: Node.js installeren
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Dependencies installeren
        run: npm ci

      - name: Linter uitvoeren
        run: npm run lint --if-present

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Code ophalen uit GitHub
        uses: actions/checkout@v4

      - name: Node.js installeren
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Dependencies installeren
        run: npm ci

      - name: Tests uitvoeren
        run: npm test