name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment!'
        default: 'production'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"

      - name: Wait for deployment and Smoke test
        run: |
          echo "Wachten tot de applicatie live is op Render..."
          MAX_RETRIES=30
          RETRY_INTERVAL=10
          URL="https://dotnovi-alexander.onrender.com/health"

          for ((i=1; i<=MAX_RETRIES; i++)); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" $URL)
          
            if [ "$STATUS" == "200" ]; then
              echo "✅ Deploy succesvol! Health check gaf status 200."
              exit 0
            fi
          
            echo "⏳ Poging $i/$MAX_RETRIES: Status is $STATUS. Nog niet klaar, we wachten ${RETRY_INTERVAL} seconden..."
            sleep $RETRY_INTERVAL
          done

          echo "❌ Health check is gefaald na 5 minuten. Check je Render logs!"
          exit 1